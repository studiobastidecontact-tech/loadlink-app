name: Build LoadLink

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Download yt-dlp + ffmpeg
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries"
          # yt-dlp
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src-tauri\binaries\yt-dlp.exe"
          # ffmpeg
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "src-tauri\binaries\ffmpeg.exe"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Rename installer
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*setup.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "src-tauri\target\release\bundle\nsis\LoadLink-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoadLink-Windows
          path: src-tauri/target/release/bundle/nsis/LoadLink-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/LoadLink-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
