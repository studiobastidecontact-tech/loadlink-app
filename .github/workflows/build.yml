name: Build LoadLink

on:
  # Trigger automatically when a tag like v1.0.2 is pushed
  push:
    tags:
      - 'v*'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'  # Apple Silicon (M1/M2/M3)
            target: 'aarch64-apple-darwin'
            arch_name: 'mac-arm64'
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos'
            ffmpeg_url: 'https://evermeet.cx/ffmpeg/getrelease/zip'

          - platform: 'macos-13'  # Intel Mac
            target: 'x86_64-apple-darwin'
            arch_name: 'mac-intel'
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos'
            ffmpeg_url: 'https://evermeet.cx/ffmpeg/getrelease/zip'

          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            arch_name: 'windows'
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      # ===== DOWNLOAD BINARIES =====

      - name: Download yt-dlp + ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          # yt-dlp universal binary
          curl -L "${{ matrix.ytdlp_url }}" -o "src-tauri/binaries/yt-dlp-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/yt-dlp-${{ matrix.target }}"
          # ffmpeg
          curl -L "${{ matrix.ffmpeg_url }}" -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/ffmpeg "src-tauri/binaries/ffmpeg-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.target }}"

      - name: Download yt-dlp + ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries"
          # yt-dlp
          Invoke-WebRequest -Uri "${{ matrix.ytdlp_url }}" -OutFile "src-tauri\binaries\yt-dlp.exe"
          # ffmpeg
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "src-tauri\binaries\ffmpeg.exe"

      # ===== BUILD =====

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      # ===== UPLOAD ARTIFACTS =====

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: loadlink-${{ matrix.arch_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: loadlink-${{ matrix.arch_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
